<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Countdown</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        /* Countdown Container */
        .countdown-container {
            text-align: center;
        }

        /* Target Label / Title */
        .label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: #666666;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        /* Timer Display */
        .timer {
            display: flex;
            gap: 3rem;
            justify-content: center;
        }

        .time-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animation Container */
        .number-container {
            position: relative;
            font-size: 5rem;
            font-weight: 300;
            height: 1em;       /* Locks height to exactly the font size */
            width: 1.5em;      /* Gives enough width for 2 digits */
            overflow: hidden;  /* Hides numbers as they slide out */
            margin-bottom: 0.5rem;
        }

        .digit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-variant-numeric: tabular-nums;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animation States */
        .digit.old {
            transform: translateY(100%);
            opacity: 0;
        }

        .digit.current {
            transform: translateY(0);
            opacity: 1;
        }

        .digit.new {
            transform: translateY(-100%);
            opacity: 0;
        }

        .unit {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #444444;
            font-weight: 600;
        }

        /* Message shown when countdown finishes */
        #expiry-message {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            display: none;
            color: #ffffff;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 600px) {
            .timer {
                gap: 1.5rem;
            }
            .number-container {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="countdown-container">
        <div class="label" id="title">Project Launch</div>
        
        <div class="timer" id="countdown">
            <div class="time-segment">
                <div class="number-container" id="hours" data-val="00">
                    <div class="digit current">00</div>
                </div>
                <span class="unit">Hours</span>
            </div>
            <div class="time-segment">
                <div class="number-container" id="minutes" data-val="00">
                    <div class="digit current">00</div>
                </div>
                <span class="unit">Mins</span>
            </div>
            <div class="time-segment">
                <div class="number-container" id="seconds" data-val="00">
                    <div class="digit current">00</div>
                </div>
                <span class="unit">Secs</span>
            </div>
        </div>

        <div id="expiry-message">LAUNCHED</div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION: SET YOUR TARGET DATE HERE
        // Format: YYYY-MM-DDTHH:MM:SS (24-hour format)
        // ==========================================
        const TARGET_DATE_STRING = "2026-12-31T23:59:59"; 
        const targetDate = new Date(TARGET_DATE_STRING).getTime();

        // Function to animate the numbers downward
        function animateValue(id, newValue) {
            const container = document.getElementById(id);
            const currentValue = container.getAttribute('data-val');

            // Only trigger animation if the number actually changed
            if (currentValue === newValue) return;
            
            // Update the tracked value
            container.setAttribute('data-val', newValue);

            // 1. Get the currently displayed digit and mark it as 'old' so it slides down
            const oldDigit = container.querySelector('.current');
            if (oldDigit) {
                oldDigit.classList.remove('current');
                oldDigit.classList.add('old');
                
                // Remove it from the DOM after the animation finishes (0.5s)
                setTimeout(() => {
                    if (oldDigit.parentNode === container) {
                        container.removeChild(oldDigit);
                    }
                }, 500);
            }

            // 2. Create the new digit, position it above, and animate it into the center
            const newDigit = document.createElement('div');
            newDigit.className = 'digit new current'; // Starts as 'new' (above)
            newDigit.innerText = newValue;
            container.appendChild(newDigit);

            // Trigger a quick layout reflow so the browser registers the starting position
            void newDigit.offsetWidth;

            // Remove the 'new' class so it transitions to the 'current' position (center)
            newDigit.classList.remove('new');
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // If the countdown is finished
            if (difference < 0) {
                document.getElementById("countdown").style.display = "none";
                document.getElementById("expiry-message").style.display = "block";
                clearInterval(intervalId);
                return;
            }

            // Time calculations (ignoring days, just total hours, minutes, and seconds)
            const hours = Math.floor(difference / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Pass the padded string to the animation handler
            animateValue("hours", String(hours).padStart(2, '0'));
            animateValue("minutes", String(minutes).padStart(2, '0'));
            animateValue("seconds", String(seconds).padStart(2, '0'));
        }

        // Run immediately on load, then update every second
        updateCountdown();
        const intervalId = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
