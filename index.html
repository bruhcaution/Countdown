<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown & Video Launch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        .countdown-container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        /* Target Label / Title */
        .label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: #666666;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        /* Timer Display */
        .timer {
            display: flex;
            gap: 3rem;
            justify-content: center;
        }

        .time-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animation Container */
        .number-container {
            position: relative;
            font-size: 5rem;
            font-weight: 300;
            height: 1em;
            width: 1.5em;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .digit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-variant-numeric: tabular-nums;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .digit.old { transform: translateY(100%); opacity: 0; }
        .digit.current { transform: translateY(0); opacity: 1; }
        .digit.new { transform: translateY(-100%); opacity: 0; }

        .unit {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #444444;
            font-weight: 600;
        }

        /* ==========================================
           VIDEO PLAYER STYLES
           ========================================== */
        #post-launch-content {
            display: none; /* Hidden by default */
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .video-wrapper {
            width: 100%;
            border: 1px solid #111111;
            background-color: #050505;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
        }

        video {
            width: 100%;
            display: block;
            outline: none;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .timer { gap: 1.5rem; }
            .number-container { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="countdown-container">
        <div class="label" id="title">Sketched for Strings</div>
        
        <div class="timer" id="countdown">
            <div class="time-segment">
                <div class="number-container" id="hours" data-val="00"><div class="digit current">00</div></div>
                <span class="unit">Hours</span>
            </div>
            <div class="time-segment">
                <div class="number-container" id="minutes" data-val="00"><div class="digit current">00</div></div>
                <span class="unit">Mins</span>
            </div>
            <div class="time-segment">
                <div class="number-container" id="seconds" data-val="00"><div class="digit current">00</div></div>
                <span class="unit">Secs</span>
            </div>
        </div>

        <div id="post-launch-content">
            <div class="video-wrapper">
                <video id="main-video" controls preload="auto">
                    <source src="75215e70649943c2b5ea6e135b247763.mov" type="video/quicktime">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION: SET YOUR TARGET DATE HERE
        // Set it to a past date like "2025-01-01" to instantly see the video player
        // ==========================================
        const TARGET_DATE_STRING = "2025-01-01T00:00:00"; 
        const targetDate = new Date(TARGET_DATE_STRING).getTime();

        // Mechanical downward scrolling animation logic
        function animateValue(id, newValue) {
            const container = document.getElementById(id);
            if (!container) return;
            
            const currentValue = container.getAttribute('data-val');
            if (currentValue === newValue) return;
            
            container.setAttribute('data-val', newValue);
            const oldDigit = container.querySelector('.current');
            
            if (oldDigit) {
                oldDigit.classList.remove('current');
                oldDigit.classList.add('old');
                setTimeout(() => { if (oldDigit.parentNode === container) container.removeChild(oldDigit); }, 500);
            }

            const newDigit = document.createElement('div');
            newDigit.className = 'digit new current';
            newDigit.innerText = newValue;
            container.appendChild(newDigit);
            void newDigit.offsetWidth;
            newDigit.classList.remove('new');
        }

        // Timer execution check
        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // If countdown is finished (or date is set to the past)
            if (difference <= 0) {
                clearInterval(intervalId);
                document.getElementById("countdown").style.display = "none";
                document.getElementById("title").innerText = "NOW STREAMING";
                document.getElementById("post-launch-content").style.display = "block";
                return;
            }

            // Calculations for Total Hours, Minutes, and Seconds
            const hours = Math.floor(difference / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            animateValue("hours", String(hours).padStart(2, '0'));
            animateValue("minutes", String(minutes).padStart(2, '0'));
            animateValue("seconds", String(seconds).padStart(2, '0'));
        }

        // Initialize clock
        updateCountdown();
        const intervalId = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
